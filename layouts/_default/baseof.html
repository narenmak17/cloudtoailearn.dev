<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ .Site.Params.description }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 1.75;
            color: #1a1a1a;
            background: #f8f9fa;
        }

        /* ── TOP NAV ── */
        .topnav {
            border-bottom: 1px solid #e5e5e5;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 58px;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 200;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .nav-brand {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1a1a1a;
            text-decoration: none;
            letter-spacing: -0.3px;
        }
        .nav-brand span { color: #0070f3; }
        .nav-right { display: flex; align-items: center; gap: 1.8rem; }
        .nav-links { display: flex; gap: 1.4rem; list-style: none; }
        .nav-links a {
            text-decoration: none;
            color: #555;
            font-size: 0.88rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #0070f3; }
        .nav-search-wrap { position: relative; }
        .nav-search {
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            padding: 5px 14px 5px 32px;
            font-size: 0.82rem;
            width: 180px;
            outline: none;
            background: #f4f4f5;
            transition: border 0.2s, width 0.3s;
        }
        .nav-search:focus { border-color: #0070f3; background: #fff; width: 220px; }
        .nav-search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 0.8rem;
            pointer-events: none;
        }

        /* ── CATEGORY BAR ── */
        .cat-bar {
            background: #fff;
            border-bottom: 1px solid #ececec;
            padding: 0 2rem;
            display: flex;
            gap: 0.3rem;
            align-items: center;
            height: 44px;
            position: sticky;
            top: 58px;
            z-index: 190;
            overflow-x: auto;
        }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-btn {
            border: none;
            background: none;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 500;
            color: #555;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, color 0.2s;
            font-family: inherit;
        }
        .cat-btn:hover { background: #eef2ff; color: #3b5bdb; }
        .cat-btn.active { background: #0070f3; color: #fff; }

        /* ── PAGE WRAPPER ── */
        .page-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 2rem;
            align-items: start;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            position: sticky;
            top: 114px;
            background: #fff;
            border: 1px solid #ececec;
            border-radius: 10px;
            padding: 1.2rem;
            max-height: calc(100vh - 130px);
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

        /* Sidebar search */
        .sb-search-wrap { position: relative; margin-bottom: 1.2rem; }
        .sb-search {
            width: 100%;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 7px 12px 7px 32px;
            font-size: 0.83rem;
            outline: none;
            background: #f8f9fa;
            font-family: inherit;
            transition: border 0.2s;
        }
        .sb-search:focus { border-color: #0070f3; background: #fff; }
        .sb-search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 0.78rem;
            pointer-events: none;
        }
        .search-results {
            display: none;
            list-style: none;
            margin-top: 0.4rem;
            border: 1px solid #ececec;
            border-radius: 8px;
            background: #fff;
            max-height: 220px;
            overflow-y: auto;
        }
        .search-results li a {
            display: block;
            padding: 7px 12px;
            font-size: 0.82rem;
            color: #1a1a1a;
            text-decoration: none;
            border-bottom: 1px solid #f4f4f5;
        }
        .search-results li a:hover { background: #f0f4ff; color: #0070f3; }
        .search-results li:last-child a { border-bottom: none; }
        .search-no-result { padding: 8px 12px; font-size: 0.82rem; color: #999; }

        /* Sidebar section title */
        .sb-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.7rem;
        }

        /* Month accordion */
        .month-group { margin-bottom: 0.3rem; }
        .month-toggle {
            width: 100%;
            background: none;
            border: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
            transition: background 0.15s;
        }
        .month-toggle:hover { background: #f4f4f5; }
        .month-toggle .badge {
            background: #eef2ff;
            color: #3b5bdb;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 1px 7px;
            border-radius: 10px;
            margin-left: auto;
            margin-right: 6px;
        }
        .month-toggle .arrow {
            font-size: 0.7rem;
            color: #aaa;
            transition: transform 0.2s;
        }
        .month-toggle.open .arrow { transform: rotate(90deg); }
        .month-posts {
            display: none;
            list-style: none;
            padding: 2px 0 4px 12px;
        }
        .month-posts.open { display: block; }
        .month-posts li a {
            display: block;
            padding: 4px 8px;
            font-size: 0.8rem;
            color: #555;
            text-decoration: none;
            border-radius: 5px;
            line-height: 1.4;
            transition: background 0.15s, color 0.15s;
        }
        .month-posts li a:hover { background: #f0f4ff; color: #0070f3; }

        /* Sidebar tags cloud */
        .sb-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.5rem; }
        .sb-tag {
            display: inline-block;
            background: #f4f4f5;
            color: #555;
            font-size: 0.73rem;
            padding: 2px 9px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
        }
        .sb-tag:hover { background: #eef2ff; color: #3b5bdb; }

        .sb-divider { border: none; border-top: 1px solid #f0f0f0; margin: 1rem 0; }

        /* ── MAIN CONTENT ── */
        .main-content { min-width: 0; }

        /* HERO */
        .hero {
            border-left: 4px solid #0070f3;
            padding: 1.2rem 1.4rem;
            margin-bottom: 2rem;
            background: #fff;
            border-radius: 0 10px 10px 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .hero h1 { font-size: 1.45rem; margin-bottom: 0.4rem; }
        .hero p { color: #666; font-size: 0.92rem; }

        /* SECTION HEADING */
        .section-heading {
            font-size: 0.75rem;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1rem;
        }

        /* POST LIST */
        .post-list { list-style: none; }
        .post-item {
            background: #fff;
            border: 1px solid #ececec;
            border-radius: 10px;
            padding: 1.4rem 1.5rem;
            margin-bottom: 1rem;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .post-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); border-color: #d0d8ff; }
        .post-item[data-category] { transition: opacity 0.2s; }
        .post-item.hidden { display: none; }
        .post-meta {
            font-size: 0.78rem;
            color: #999;
            margin-bottom: 0.35rem;
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }
        .post-cat-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1px 8px;
            border-radius: 10px;
            background: #fff3e0;
            color: #e65100;
        }
        .post-item h2 { font-size: 1.1rem; margin-bottom: 0.35rem; line-height: 1.4; }
        .post-item h2 a { text-decoration: none; color: #1a1a1a; }
        .post-item h2 a:hover { color: #0070f3; }
        .post-summary { color: #666; font-size: 0.88rem; margin-bottom: 0.7rem; }
        .read-more {
            font-size: 0.82rem;
            color: #0070f3;
            text-decoration: none;
            font-weight: 600;
        }
        .read-more:hover { text-decoration: underline; }

        /* TAGS */
        .tag {
            display: inline-block;
            background: #eef2ff;
            color: #3b5bdb;
            font-size: 0.72rem;
            padding: 2px 9px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 500;
        }
        .tag:hover { background: #dde4ff; }
        .tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin: 0.5rem 0 0.7rem; }

        /* SINGLE POST */
        .post-header { margin-bottom: 2rem; }
        .post-header h1 { font-size: 1.9rem; line-height: 1.3; margin-bottom: 0.7rem; }
        .post-cover {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 10px;
            margin: 1.2rem 0 1.8rem;
        }
        .post-content h2 { font-size: 1.3rem; margin: 2rem 0 0.7rem; }
        .post-content h3 { font-size: 1.1rem; margin: 1.4rem 0 0.5rem; }
        .post-content p { margin-bottom: 1.1rem; }
        .post-content ul, .post-content ol { margin: 0 0 1.1rem 1.5rem; }
        .post-content li { margin-bottom: 0.35rem; }
        .post-content a { color: #0070f3; }
        .post-content blockquote {
            border-left: 4px solid #0070f3;
            padding: 0.7rem 1.1rem;
            background: #f7f9ff;
            border-radius: 0 6px 6px 0;
            margin: 1.4rem 0;
            color: #444;
            font-style: italic;
        }
        .post-content code {
            background: #f4f4f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.86em;
            font-family: 'Courier New', monospace;
        }
        .post-content pre {
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 1.1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.4rem 0;
            font-size: 0.86rem;
        }
        .post-content pre code { background: none; color: inherit; padding: 0; }
        .post-content img { max-width: 100%; border-radius: 8px; margin: 1.4rem 0; }
        .post-content table { width: 100%; border-collapse: collapse; margin: 1.4rem 0; font-size: 0.88rem; }
        .post-content th { background: #f4f4f5; padding: 0.55rem 0.9rem; text-align: left; border: 1px solid #e5e5e5; }
        .post-content td { padding: 0.55rem 0.9rem; border: 1px solid #e5e5e5; }

        /* FOOTER */
        footer {
            border-top: 1px solid #e5e5e5;
            text-align: center;
            padding: 1.8rem;
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 3rem;
            background: #fff;
        }
        footer a { color: #0070f3; text-decoration: none; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .page-wrap { grid-template-columns: 1fr; }
            .sidebar { position: static; max-height: none; }
            .cat-bar { top: 58px; }
        }
    </style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
    <a class="nav-brand" href="/">Cloud<span>ToAI</span>Learn</a>
    <div class="nav-right">
        <ul class="nav-links">
            {{ range .Site.Menus.main }}
            <li><a href="{{ .URL }}">{{ .Name }}</a></li>
            {{ end }}
        </ul>
        <div class="nav-search-wrap">
            <span class="nav-search-icon">🔍</span>
            <input class="nav-search" id="navSearch" type="text" placeholder="Search posts...">
        </div>
    </div>
</nav>

<!-- CATEGORY BAR -->
<div class="cat-bar">
    <button class="cat-btn active" data-cat="all">All</button>
    <button class="cat-btn" data-cat="cloud">☁️ Cloud</button>
    <button class="cat-btn" data-cat="ai">🤖 AI</button>
    <button class="cat-btn" data-cat="resiliency">🛡️ Resiliency</button>
    <button class="cat-btn" data-cat="cost-optimization">💰 Cost Optimization</button>
    <button class="cat-btn" data-cat="patterns">🧩 Patterns</button>
</div>

<!-- PAGE LAYOUT -->
<div class="page-wrap">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        {{ partial "sidebar.html" . }}
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        {{ block "main" . }}{{ end }}
    </main>

</div>

<footer>
    <p>© {{ now.Year }} CloudToAILearn · Built by Naren ·
    <a href="https://github.com" target="_blank">GitHub</a> ·
    <a href="https://linkedin.com" target="_blank">LinkedIn</a></p>
</footer>

<script>
// ── CATEGORY FILTER ──
document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const cat = btn.dataset.cat;
        document.querySelectorAll('.post-item[data-category]').forEach(item => {
            if (cat === 'all' || item.dataset.category === cat) {
                item.classList.remove('hidden');
            } else {
                item.classList.add('hidden');
            }
        });
    });
});

// ── MONTH ACCORDION ──
document.querySelectorAll('.month-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
        const posts = btn.nextElementSibling;
        const isOpen = posts.classList.contains('open');
        posts.classList.toggle('open', !isOpen);
        btn.classList.toggle('open', !isOpen);
    });
});

// ── SIDEBAR SEARCH ──
const sbSearch = document.getElementById('sbSearch');
const searchResults = document.getElementById('searchResults');

if (sbSearch) {
    sbSearch.addEventListener('input', function () {
        const q = this.value.trim().toLowerCase();
        if (!q) { searchResults.style.display = 'none'; return; }
        const items = document.querySelectorAll('.post-item[data-title]');
        let html = '';
        items.forEach(item => {
            const title = item.dataset.title || '';
            const url = item.dataset.url || '';
            if (title.toLowerCase().includes(q)) {
                html += `<li><a href="${url}">${title}</a></li>`;
            }
        });
        searchResults.innerHTML = html || '<li class="search-no-result">No results found</li>';
        searchResults.style.display = 'block';
    });
    document.addEventListener('click', e => {
        if (!sbSearch.contains(e.target)) searchResults.style.display = 'none';
    });
}

// ── NAV SEARCH (scroll to matching post) ──
const navSearch = document.getElementById('navSearch');
if (navSearch) {
    navSearch.addEventListener('input', function () {
        const q = this.value.trim().toLowerCase();
        document.querySelectorAll('.post-item[data-title]').forEach(item => {
            if (!q || item.dataset.title.toLowerCase().includes(q)) {
                item.classList.remove('hidden');
            } else {
                item.classList.add('hidden');
            }
        });
    });
}
</script>

</body>
</html>
