<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0070f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0056cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5deb3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6c89f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>

  <!-- Cloud shapes in background -->
  <ellipse cx="80" cy="60" rx="45" ry="25" fill="#ffffff" opacity="0.15"/>
  <ellipse cx="320" cy="100" rx="50" ry="30" fill="#ffffff" opacity="0.15"/>

  <!-- AI Neural Network nodes (background) -->
  <circle cx="100" cy="120" r="4" fill="#00ff88" opacity="0.6"/>
  <circle cx="150" cy="100" r="4" fill="#00ff88" opacity="0.6"/>
  <circle cx="200" cy="90" r="4" fill="#00ff88" opacity="0.6"/>
  <circle cx="300" cy="140" r="4" fill="#00ff88" opacity="0.6"/>
  <circle cx="350" cy="110" r="4" fill="#00ff88" opacity="0.6"/>

  <!-- Neural network connections -->
  <line x1="100" y1="120" x2="150" y2="100" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <line x1="150" y1="100" x2="200" y2="90" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="90" x2="300" y2="140" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <line x1="300" y1="140" x2="350" y2="110" stroke="#00ff88" stroke-width="1" opacity="0.4"/>

  <!-- Head -->
  <circle cx="200" cy="140" r="45" fill="url(#skinGradient)" filter="url(#shadow)"/>

  <!-- Hair -->
  <path d="M 155 110 Q 155 95 200 90 Q 245 95 245 110 Z" fill="#2c2c2c"/>

  <!-- Ears -->
  <ellipse cx="155" cy="140" rx="12" ry="20" fill="url(#skinGradient)"/>
  <ellipse cx="245" cy="140" rx="12" ry="20" fill="url(#skinGradient)"/>

  <!-- Face features -->
  <!-- Eyes -->
  <circle cx="180" cy="130" r="6" fill="#1a1a1a"/>
  <circle cx="220" cy="130" r="6" fill="#1a1a1a"/>
  <circle cx="182" cy="128" r="2" fill="#ffffff"/> <!-- eye shine -->
  <circle cx="222" cy="128" r="2" fill="#ffffff"/>

  <!-- Nose -->
  <line x1="200" y1="135" x2="200" y2="150" stroke="#d4a574" stroke-width="2"/>

  <!-- Mouth (thinking/focus expression) -->
  <path d="M 190 160 Q 200 165 210 160" stroke="#a0826d" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="190" y="180" width="20" height="15" fill="url(#skinGradient)"/>

  <!-- Shoulders and Business Casual Attire -->
  <ellipse cx="200" cy="210" rx="70" ry="35" fill="#2c3e50"/>
  
  <!-- Shirt/blazer -->
  <path d="M 140 210 L 130 250 L 270 250 L 260 210 Z" fill="#1a1a1a"/>
  <path d="M 200 215 L 195 250 L 205 250 Z" fill="#0070f3" opacity="0.5"/> <!-- shirt accent -->

  <!-- Laptop -->
  <g transform="translate(200, 280)">
    <!-- Laptop base -->
    <rect x="-50" y="0" width="100" height="60" rx="5" fill="#2c2c2c" filter="url(#shadow)"/>
    <!-- Screen -->
    <rect x="-45" y="-45" width="90" height="48" rx="3" fill="#000"/>
    <!-- Screen gradient (lit) -->
    <rect x="-43" y="-43" width="86" height="44" rx="2" fill="#0070f3" opacity="0.8"/>
    <!-- Screen content -->
    <circle cx="-20" cy="-35" r="8" fill="#00ff88" opacity="0.8"/>
    <circle cx="0" cy="-30" r="6" fill="#00ff88" opacity="0.8"/>
    <circle cx="20" cy="-35" r="7" fill="#00ff88" opacity="0.8"/>
    <line x1="-20" y1="-35" x2="0" y2="-30" stroke="#00ff88" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="-30" x2="20" y2="-35" stroke="#00ff88" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Cloud icons around -->
  <!-- Cloud 1 (top right) -->
  <g transform="translate(330, 80)">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#ffffff" opacity="0.25"/>
    <ellipse cx="-12" cy="3" rx="10" ry="8" fill="#ffffff" opacity="0.25"/>
    <ellipse cx="12" cy="3" rx="10" ry="8" fill="#ffffff" opacity="0.25"/>
  </g>

  <!-- Code/Data symbols -->
  <text x="80" y="200" font-family="monospace" font-size="12" fill="#00ff88" opacity="0.6">&lt;/&gt;</text>
  <text x="320" y="200" font-family="monospace" font-size="12" fill="#00ff88" opacity="0.6">AI</text>

  <!-- Center circle frame (optional decorative) -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1" stroke-dasharray="5,5"/>

  <!-- Bottom accent - tech elements -->
  <g transform="translate(200, 360)">
    <text x="-30" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" opacity="0.8">Architect</text>
  </g>
</svg>